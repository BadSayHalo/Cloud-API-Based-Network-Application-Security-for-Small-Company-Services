_format_version: "3.0"

services:
  - name: order-service-backend
    url: http://172.17.0.1:3000
    routes:
      - name: fetch-orders
        paths:
          - /api/v1/orders
        strip_path: false

plugins:
  - name: rate-limiting
    config:
      minute: 10
      policy: local
  - name: key-auth
    config:
      key_names:
        - apikey

consumers:
  - username: "1"
    keyauth_credentials:
      - key: key-user-1
  - username: "2"
    keyauth_credentials:
      - key: key-user-2
