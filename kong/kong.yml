_format_version: "3.0"

services:
  - name: order-service-backend
    url: http://order-service:3000
    routes:
      - name: fetch-orders
        paths:
          - /api/v1/orders
        strip_path: true

plugins:
  - name: rate-limiting
    config:
      minute: 10
      policy: local
      
  - name: key-auth
    config:
      key_names:
        - apikey

consumers:
  - username: "1"
    keyauth_credentials:
      - key: key-user-1

  - username: "2"
    keyauth_credentials:
      - key: key-user-2
